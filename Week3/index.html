<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI-powered Smart Task Planner — enter a goal and get a step-by-step plan generated by Google Gemini." />
  <title>Smart Task Planner — AI Powered</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <!-- Header -->
    <header class="header">
      <div class="header__icon">🧠</div>
      <h1 class="header__title">Smart Task Planner</h1>
      <p class="header__subtitle">Enter a goal. Let AI break it down into actionable steps.</p>
    </header>

    <!-- Goal Input Card -->
    <section class="input-card" aria-label="Enter your goal">
      <form class="input-card__form" id="goal-form">
        <div class="input-card__field">
          <input
            type="text"
            class="input-card__input"
            id="goal-input"
            placeholder="e.g. Plan a trip to Japan, Learn guitar, Launch a startup..."
            autocomplete="off"
            maxlength="300"
          />
          <span class="input-card__hint" id="char-count">0 / 300</span>
        </div>
        <button type="submit" class="input-card__btn" id="plan-btn">
          <span class="btn__text">Plan It</span>
          <span class="btn__icon">✨</span>
        </button>
      </form>
    </section>

    <!-- Loading State -->
    <section class="loading-state hidden" id="loading-state" aria-label="Loading">
      <div class="loading-state__card">
        <div class="loading-state__spinner"></div>
        <p class="loading-state__text">Gemini is thinking<span class="loading-dots"></span></p>
        <p class="loading-state__subtext">Generating your step-by-step plan...</p>
      </div>
    </section>

    <!-- Error State -->
    <section class="error-state hidden" id="error-state" aria-label="Error">
      <div class="error-state__card">
        <div class="error-state__icon">⚠️</div>
        <p class="error-state__title">Something went wrong</p>
        <p class="error-state__message" id="error-message">Failed to generate tasks.</p>
        <button class="error-state__btn" id="retry-btn">Try Again</button>
      </div>
    </section>

    <!-- Results -->
    <section class="results hidden" id="results-section" aria-label="Generated tasks">
      <div class="results__header">
        <h2 class="results__title" id="results-title">Your Plan</h2>
        <span class="results__badge" id="results-count">0 steps</span>
      </div>
      <div class="results__goal-tag" id="results-goal"></div>
      <div class="results__list" id="results-list"></div>
    </section>

    <!-- Empty / Initial State -->
    <section class="empty-state" id="empty-state" aria-label="Get started">
      <div class="empty-state__icon">🎯</div>
      <p class="empty-state__text">Enter a goal above and let AI create your action plan!</p>
    </section>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script>
    // ===== DOM Elements =====
    const goalForm = document.getElementById('goal-form');
    const goalInput = document.getElementById('goal-input');
    const charCount = document.getElementById('char-count');
    const planBtn = document.getElementById('plan-btn');
    const loadingState = document.getElementById('loading-state');
    const errorState = document.getElementById('error-state');
    const errorMessage = document.getElementById('error-message');
    const retryBtn = document.getElementById('retry-btn');
    const resultsSection = document.getElementById('results-section');
    const resultsTitle = document.getElementById('results-title');
    const resultsCount = document.getElementById('results-count');
    const resultsGoal = document.getElementById('results-goal');
    const resultsList = document.getElementById('results-list');
    const emptyState = document.getElementById('empty-state');
    const toastContainer = document.getElementById('toast-container');

    let lastGoal = '';

    // ===== Character Counter =====
    goalInput.addEventListener('input', () => {
      const len = goalInput.value.length;
      charCount.textContent = `${len} / 300`;
      charCount.classList.toggle('over-limit', len > 280);
    });

    // ===== Toast Notifications =====
    function showToast(message, type = 'info') {
      const icons = { success: '✅', error: '⚠️', info: 'ℹ️' };
      const toast = document.createElement('div');
      toast.className = `toast toast--${type}`;
      toast.innerHTML = `
        <span class="toast__icon">${icons[type]}</span>
        <span>${message}</span>
      `;
      toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('removing');
        toast.addEventListener('animationend', () => toast.remove());
      }, 3500);
    }

    // ===== State Management =====
    function showSection(section) {
      [loadingState, errorState, resultsSection, emptyState].forEach(el =>
        el.classList.add('hidden')
      );
      if (section) section.classList.remove('hidden');
    }

    function setLoading(isLoading) {
      planBtn.disabled = isLoading;
      goalInput.disabled = isLoading;
      planBtn.classList.toggle('loading', isLoading);
      if (isLoading) {
        showSection(loadingState);
      }
    }

    // ===== Priority Helpers =====
    function getPriorityClass(priority) {
      const p = (priority || '').toLowerCase();
      if (p === 'high') return 'priority--high';
      if (p === 'medium') return 'priority--medium';
      return 'priority--low';
    }

    function getPriorityIcon(priority) {
      const p = (priority || '').toLowerCase();
      if (p === 'high') return '🔴';
      if (p === 'medium') return '🟡';
      return '🟢';
    }

    // ===== Escape HTML =====
    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ===== Render Tasks =====
    function renderTasks(tasks, goal) {
      resultsTitle.textContent = '📋 Your Plan';
      resultsCount.textContent = `${tasks.length} step${tasks.length !== 1 ? 's' : ''}`;
      resultsGoal.innerHTML = `<span class="goal-label">Goal:</span> ${escapeHTML(goal)}`;

      resultsList.innerHTML = tasks.map((task, i) => `
        <div class="task-card" style="animation-delay: ${i * 0.08}s">
          <div class="task-card__step">
            <span class="task-card__step-number">${i + 1}</span>
          </div>
          <div class="task-card__body">
            <p class="task-card__name">${escapeHTML(task.task_name)}</p>
            <div class="task-card__meta">
              <span class="task-card__priority ${getPriorityClass(task.priority)}">
                ${getPriorityIcon(task.priority)} ${escapeHTML(task.priority)}
              </span>
              <span class="task-card__time">
                ⏱️ ${escapeHTML(task.estimated_time)}
              </span>
            </div>
          </div>
          <div class="task-card__connector"></div>
        </div>
      `).join('');

      showSection(resultsSection);
    }

    // ===== Generate Plan =====
    async function generatePlan(goal) {
      setLoading(true);
      lastGoal = goal;

      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ goal }),
        });

        const data = await res.json();

        if (!data.success) {
          throw new Error(data.error || 'Failed to generate tasks.');
        }

        if (!data.tasks || data.tasks.length === 0) {
          throw new Error('No tasks were generated. Try a different goal.');
        }

        renderTasks(data.tasks, goal);
        showToast(`Generated ${data.tasks.length} tasks!`, 'success');
      } catch (err) {
        errorMessage.textContent = err.message || 'An unexpected error occurred.';
        showSection(errorState);
        showToast('Failed to generate plan.', 'error');
      } finally {
        setLoading(false);
      }
    }

    // ===== Form Submit =====
    goalForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const goal = goalInput.value.trim();

      if (!goal) {
        showToast('Please enter a goal first!', 'error');
        goalInput.classList.add('shake');
        setTimeout(() => goalInput.classList.remove('shake'), 400);
        return;
      }

      if (goal.length < 3) {
        showToast('Goal must be at least 3 characters.', 'error');
        goalInput.classList.add('shake');
        setTimeout(() => goalInput.classList.remove('shake'), 400);
        return;
      }

      generatePlan(goal);
    });

    // ===== Retry =====
    retryBtn.addEventListener('click', () => {
      if (lastGoal) {
        generatePlan(lastGoal);
      } else {
        showSection(emptyState);
        goalInput.focus();
      }
    });
  </script>
</body>
</html>
